<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órdenes de Venta - Control de Despachos</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/notas.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
  <div id="nav-placeholder"></div>

  <div class="page-content">
    <!-- KPIs -->
    <div class="kpi-row" id="kpiRow" style="margin-bottom: 16px;"></div>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div class="page-header-left">
        <h1 style="font-size:1.15rem;margin-bottom:2px">Órdenes de Venta</h1>
        <p style="font-size:.8rem;margin-top:0">Gestión de órdenes activas y pendientes de emisión de guía</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="exportarCSV()">
          <span class="material-icons">download</span> Exportar
        </button>
      </div>
    </div>

    <!-- TABLA -->
    <div class="card" style="margin-top:-8px">
      <div class="filter-bar">
        <div class="search-input">
          <span class="material-icons">search</span>
          <input type="text" id="searchInput" placeholder="Buscar por N° OV, cliente, distrito...">
        </div>
        <select class="filter-select" id="estadoFilter">
          <option value="">Todos los estados</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="URGENTE">Urgente</option>
          <option value="VENCIDA">Vencida</option>
          <option value="AGENDADA">Agendada</option>
          <option value="EMITIDA">Emitida</option>
          <option value="PROGRAMADA">Programada</option>
          <option value="DESPACHADA">Despachada</option>
          <option value="CERRADA">Cerrada</option>
        </select>
        <select class="filter-select" id="distFilter">
          <option value="">Todos los distritos</option>
        </select>
      </div>

      <div class="table-wrap" style="overflow-x:auto">
        <table style="min-width:1100px">
          <thead>
            <tr>
              <th style="width:36px"><input type="checkbox" id="selectAll"></th>
              <th style="min-width:130px">N° OV</th>
              <th style="min-width:110px">N° OT</th>
              <th style="min-width:90px">Fecha / Hora</th>
              <th style="min-width:160px">Cliente</th>
              <th style="min-width:120px">Vendedor</th>
              <th style="min-width:160px">Destino</th>
              <th style="min-width:90px">Cantidad</th>
              <th style="min-width:90px">F. Necesidad</th>
              <th style="min-width:110px">Estado</th>
              <th class="col-sticky-right" style="min-width:180px">Acciones</th>
            </tr>
            <tr class="col-filters" style="background:#f8fafc">
              <th></th>
              <th><input type="text" id="fc_ov" class="form-input" style="padding:4px 8px; font-size:.75rem;"
                  placeholder="Filtro..." oninput="applyFilters()"></th>
              <th><input type="text" id="fc_ot" class="form-input" style="padding:4px 8px; font-size:.75rem;"
                  placeholder="Filtro..." oninput="applyFilters()"></th>
              <th><input type="text" id="fc_fecha" class="form-input" style="padding:4px 8px; font-size:.75rem;"
                  placeholder="Filtro..." oninput="applyFilters()"></th>
              <th><input type="text" id="fc_cliente" class="form-input" style="padding:4px 8px; font-size:.75rem;"
                  placeholder="Filtro..." oninput="applyFilters()"></th>
              <th><input type="text" id="fc_vend" class="form-input" style="padding:4px 8px; font-size:.75rem;"
                  placeholder="Filtro..." oninput="applyFilters()"></th>
              <th><input type="text" id="fc_dest" class="form-input" style="padding:4px 8px; font-size:.75rem;"
                  placeholder="Filtro..." oninput="applyFilters()"></th>
              <th></th>
              <th></th>
              <th></th>
              <th class="col-sticky-right"></th>
            </tr>
          </thead>
          <tbody id="tbodyOVs"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="page-info" id="pageInfo"></span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>

  <!-- MODAL EMITIR GRE -->
  <div class="modal-overlay" id="modalEmitir">
    <div class="modal">
      <div class="modal-header">
        <h3><span class="material-icons" style="color:var(--primary)">receipt_long</span> Emitir Guía de Remisión</h3>
        <button class="close-modal" onclick="closeModal('modalEmitir')"><span
            class="material-icons">close</span></button>
      </div>
      <div class="modal-body">
        <div
          style="background:var(--blue-bg);border-radius:8px;padding:14px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start;">
          <span class="material-icons" style="color:var(--blue);font-size:20px;flex-shrink:0">info</span>
          <div>
            <div style="font-size:.82rem;font-weight:600;color:var(--blue)">OV Seleccionada</div>
            <div style="font-size:.8rem;color:#1e40af;margin-top:2px" id="modalOvInfo"></div>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">N° de Guía (GRE)</label>
            <input class="form-input" type="text" id="emitirNumGre" placeholder="Auto-generado" readonly
              style="background:#f8fafc">
          </div>
          <div class="form-group">
            <label class="form-label">Cantidad a Emitir</label>
            <input class="form-input" type="number" id="emitirCantidad" min="1" required>
            <span class="text-sm" id="emitirDisponible"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Fecha Emisión</label>
            <input class="form-input" type="date" id="emitirFecha">
          </div>
          <div class="form-group">
            <label class="form-label">Courier / Transporte</label>
            <input class="form-input" type="text" id="emitirCourier">
          </div>
          <div class="form-group full">
            <label class="form-label">Observaciones</label>
            <textarea class="form-textarea" id="emitirObs" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modalEmitir')">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarEmision()">
          <span class="material-icons">check_circle</span> Emitir GRE
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE OV -->
  <div class="modal-overlay" id="modalDetalle">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3><span class="material-icons" style="color:var(--primary)">assignment</span> Detalle de Orden de Venta</h3>
        <button class="close-modal" onclick="closeModal('modalDetalle')"><span
            class="material-icons">close</span></button>
      </div>
      <div class="modal-body" id="modalDetalleBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modalDetalle')">Cerrar</button>
        <button class="btn btn-primary" id="btnEmitirDesdeDetalle">
          <span class="material-icons">receipt_long</span> Emitir GRE
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app-config.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/notas.js"></script>
  <script>
    const user = requireAuth();
    document.getElementById('nav-placeholder').innerHTML = renderNav('ov_generadas');

    let allOVs = [], filteredOVs = [], currentPage = 1;
    const PER_PAGE = 15;
    let currentOV = null;

    function init() {
      allOVs = genOVs();
      filteredOVs = [...allOVs];
      renderKPIs();
      renderDistFilter();
      render();
      setListeners();
      // set today's date
      document.getElementById('emitirFecha').value = new Date().toISOString().substr(0, 10);
    }

    function renderKPIs() {
      const pendientes = allOVs.filter(o => ['PENDIENTE', 'AGENDADA'].includes(o.estado)).length;
      const urgentes = allOVs.filter(o => o.estado === 'URGENTE').length;
      const vencidas = allOVs.filter(o => o.estado === 'VENCIDA').length;
      const emitidas = allOVs.filter(o => o.estado === 'EMITIDA').length;
      const programadas = allOVs.filter(o => o.estado === 'PROGRAMADA').length;
      document.getElementById('kpiRow').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">Total OVs</div><div class="kpi-value">${allOVs.length}</div><span class="material-icons kpi-icon">assignment</span></div>
      <div class="kpi-card"><div class="kpi-label">Pendientes</div><div class="kpi-value" style="color:var(--blue)">${pendientes}</div><span class="material-icons kpi-icon">pending</span></div>
      <div class="kpi-card"><div class="kpi-label" style="color:var(--orange)">Urgentes</div><div class="kpi-value" style="color:var(--orange)">${urgentes}</div><span class="material-icons kpi-icon">priority_high</span></div>
      <div class="kpi-card"><div class="kpi-label" style="color:var(--red)">Vencidas</div><div class="kpi-value" style="color:var(--red)">${vencidas}</div><span class="material-icons kpi-icon">event_busy</span></div>
      <div class="kpi-card"><div class="kpi-label">Emitidas</div><div class="kpi-value" style="color:var(--purple)">${emitidas}</div><span class="material-icons kpi-icon">receipt</span></div>
      <div class="kpi-card"><div class="kpi-label" style="color:var(--yellow)">Programadas</div><div class="kpi-value" style="color:var(--yellow)">${programadas}</div><span class="material-icons kpi-icon">schedule_send</span></div>
    `;
    }

    function renderDistFilter() {
      const distritos = [...new Set(allOVs.map(o => o.distrito))].sort();
      const sel = document.getElementById('distFilter');
      distritos.forEach(d => { const op = document.createElement('option'); op.value = d; op.textContent = d; sel.appendChild(op); });
    }

    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const estado = document.getElementById('estadoFilter').value;
      const dist = document.getElementById('distFilter').value;

      const fc_ov = document.getElementById('fc_ov').value.toLowerCase();
      const fc_ot = document.getElementById('fc_ot').value.toLowerCase();
      const fc_fecha = document.getElementById('fc_fecha').value.toLowerCase();
      const fc_cliente = document.getElementById('fc_cliente').value.toLowerCase();
      const fc_vend = document.getElementById('fc_vend').value.toLowerCase();
      const fc_dest = document.getElementById('fc_dest').value.toLowerCase();

      filteredOVs = allOVs.filter(o => {
        const matchQ = !q || o.numero_ov.toLowerCase().includes(q) || o.cliente_nombre.toLowerCase().includes(q) || o.distrito.toLowerCase().includes(q) || (o.numero_ot && o.numero_ot.toLowerCase().includes(q));
        const matchE = !estado || o.estado === estado;
        const matchD = !dist || o.distrito === dist;

        const mOv = !fc_ov || o.numero_ov.toLowerCase().includes(fc_ov);
        const mOt = !fc_ot || (o.numero_ot && o.numero_ot.toLowerCase().includes(fc_ot));
        const mFc = !fc_fecha || o.fecha_creacion.includes(fc_fecha);
        const mCl = !fc_cliente || o.cliente_nombre.toLowerCase().includes(fc_cliente);
        const mVd = !fc_vend || (o.vendedor && o.vendedor.toLowerCase().includes(fc_vend));
        const mDs = !fc_dest || o.domicilio_destino.toLowerCase().includes(fc_dest);

        return matchQ && matchE && matchD && mOv && mOt && mFc && mCl && mVd && mDs;
      });
      currentPage = 1;
      render();
    }

    function render() {
      const start = (currentPage - 1) * PER_PAGE;
      const pageData = filteredOVs.slice(start, start + PER_PAGE);
      const tbody = document.getElementById('tbodyOVs');

      if (!pageData.length) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><span class="material-icons">search_off</span><p>No se encontraron órdenes</p></div></td></tr>`;
      } else {
        tbody.innerHTML = pageData.map(o => {
          const canEmit = ['PENDIENTE', 'AGENDADA', 'URGENTE', 'VENCIDA'].includes(o.estado);
          return `<tr style="${o.estado === 'BLOQUEADO' ? 'background-color:#fee2e2' : ''}">
          <td><input type="checkbox" class="row-cb" data-id="${o.id}"></td>
          <td><a href="#" class="text-strong" style="color:var(--primary);text-decoration:none" onclick="verDetalle('${o.id}')">${o.numero_ov}</a></td>
          <td>${o.numero_ot || '—'}</td>
          <td><div style="white-space:nowrap">${o.fecha_creacion}</div><div class="text-sm">${o.hora_creacion}</div></td>
          <td><div class="text-strong">${o.cliente_nombre}</div><div class="text-sm">${o.area_solicitante}</div></td>
          <td><div style="font-size:.83rem">${o.vendedor || o.solicitado_por}</div></td>
          <td><div>${o.domicilio_destino}</div><div class="text-sm">${o.distrito}</div></td>
          <td style="white-space:nowrap">${o.cantidad.toLocaleString()} ${o.udm}</td>
          <td style="white-space:nowrap">${o.fecha_necesidad}</td>
          <td>${semaforo(o.estado)} ${badge(o.estado, badgeEstado(o.estado))}</td>
          <td class="col-sticky-right">
            <div style="display:flex;gap:5px">
              <button class="btn btn-sm btn-secondary" onclick="verDetalle('${o.id}')" title="Ver detalle"><span class="material-icons" style="font-size:15px">visibility</span></button>
              ${notasBtn(o.id, o.numero_ov)}
              ${canEmit ? `<button class="btn btn-sm btn-primary" onclick="abrirEmitir('${o.id}')" title="Emitir GRE"><span class="material-icons" style="font-size:15px">receipt_long</span></button>` : ''}
            </div>
          </td>
        </tr>`;
        }).join('');
      }

      renderPagination();
    }

    function renderPagination() {
      const total = filteredOVs.length;
      const pages = Math.ceil(total / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE + 1;
      const end = Math.min(currentPage * PER_PAGE, total);
      document.getElementById('pageInfo').textContent = `Mostrando ${start}–${end} de ${total} registros`;
      const btns = document.getElementById('pageBtns');
      btns.innerHTML = '';
      for (let i = 1; i <= pages; i++) {
        const b = document.createElement('button');
        b.className = 'page-btn' + (i === currentPage ? ' active' : '');
        b.textContent = i;
        b.onclick = () => { currentPage = i; render(); };
        btns.appendChild(b);
      }
    }

    function abrirEmitir(ovId) {
      currentOV = allOVs.find(o => o.id === ovId);
      if (!currentOV) return;
      document.getElementById('modalOvInfo').innerHTML = `<strong>${currentOV.numero_ov}</strong> — ${currentOV.cliente_nombre} · ${currentOV.cantidad.toLocaleString()} ${currentOV.udm}`;
      document.getElementById('emitirCantidad').value = currentOV.cantidad;
      document.getElementById('emitirCantidad').max = currentOV.cantidad;
      document.getElementById('emitirDisponible').textContent = `Máximo: ${currentOV.cantidad.toLocaleString()} ${currentOV.udm}`;
      document.getElementById('emitirCourier').value = currentOV.courier_sugerido;
      const gres = JSON.parse(localStorage.getItem('gres_data') || '[]');
      const nextNum = 4560 + gres.length + 1;
      document.getElementById('emitirNumGre').value = `GRE-001-${nextNum}`;
      openModal('modalEmitir');
    }

    function confirmarEmision() {
      if (!currentOV) return;
      const cantidad = parseInt(document.getElementById('emitirCantidad').value);
      if (!cantidad || cantidad < 1) { alert('Ingrese una cantidad válida'); return; }
      if (cantidad > currentOV.cantidad) { alert('La cantidad no puede superar la OV'); return; }

      const gres = JSON.parse(localStorage.getItem('gres_data') || '[]');
      const newGre = {
        id: `gre-${Date.now()}`,
        numero_gre: document.getElementById('emitirNumGre').value,
        ov_id: currentOV.id,
        numero_ov: currentOV.numero_ov,
        cliente_nombre: currentOV.cliente_nombre,
        domicilio_destino: currentOV.domicilio_destino,
        distrito: currentOV.distrito,
        fecha_emision: document.getElementById('emitirFecha').value,
        hora_emision: new Date().toTimeString().substr(0, 5),
        cantidad_ov: currentOV.cantidad,
        cantidad_emitida: cantidad,
        estado_gre: cantidad >= currentOV.cantidad ? 'COMPLETO' : 'PARCIAL',
        programada: false,
        hoja_ruta_id: null,
      };
      gres.push(newGre);
      localStorage.setItem('gres_data', JSON.stringify(gres));

      // Actualizar estado de OV
      const ovIdx = allOVs.findIndex(o => o.id === currentOV.id);
      allOVs[ovIdx].estado = 'EMITIDA';
      localStorage.setItem('ovs_data', JSON.stringify(allOVs));

      closeModal('modalEmitir');
      showToast(`✅ GRE emitida: ${newGre.numero_gre}`, 'success');
      renderKPIs();
      applyFilters();
    }

    function verDetalle(ovId) {
      const ov = allOVs.find(o => o.id === ovId);
      if (!ov) return;
      const canEmit = ['PENDIENTE', 'AGENDADA', 'URGENTE', 'VENCIDA'].includes(ov.estado);
      document.getElementById('modalDetalleBody').innerHTML = `
      <div class="detail-section">
        <h4>Información Principal</h4>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">N° OV</div><div class="detail-value">${ov.numero_ov}</div></div>
          <div class="detail-item"><div class="detail-label">Estado</div><div class="detail-value">${semaforo(ov.estado)} ${badge(ov.estado, badgeEstado(ov.estado))}</div></div>
          <div class="detail-item"><div class="detail-label">OC / Cotización</div><div class="detail-value">${ov.oc_cotizacion || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">N° OT</div><div class="detail-value">${ov.numero_ot || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Fecha Creación</div><div class="detail-value">${ov.fecha_creacion}</div></div>
          <div class="detail-item"><div class="detail-label">Hora</div><div class="detail-value">${ov.hora_creacion}</div></div>
          <div class="detail-item"><div class="detail-label">F. Necesidad</div><div class="detail-value" style="color:var(--red);font-weight:700">${ov.fecha_necesidad}</div></div>
          <div class="detail-item"><div class="detail-label">Vendedor</div><div class="detail-value" style="font-weight:600;color:var(--primary)">${ov.vendedor || ov.solicitado_por}</div></div>
          <div class="detail-item"><div class="detail-label">Solicitado Por</div><div class="detail-value">${ov.solicitado_por}</div></div>
        </div>
        <!-- Trazabilidad -->
        <div style="margin-top:12px;padding:10px 14px;background:var(--blue-bg);border-radius:8px;font-size:.8rem;color:#1e40af;display:flex;gap:16px;flex-wrap:wrap">
          <span><span class="material-icons" style="font-size:14px;vertical-align:middle">schedule</span> <strong>Creada:</strong> ${ov.fecha_creacion} ${ov.hora_creacion}</span>
          <span><span class="material-icons" style="font-size:14px;vertical-align:middle">person</span> <strong>Vendedor:</strong> ${ov.vendedor || ov.solicitado_por}</span>
        </div>
      <div class="detail-section">
        <h4>Cliente y Destino</h4>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Cliente</div><div class="detail-value">${ov.cliente_nombre}</div></div>
          <div class="detail-item"><div class="detail-label">Área Solicitante</div><div class="detail-value">${ov.area_solicitante}</div></div>
          <div class="detail-item"><div class="detail-label">Dirección Destino</div><div class="detail-value">${ov.domicilio_destino}</div></div>
          <div class="detail-item"><div class="detail-label">Distrito</div><div class="detail-value">${ov.distrito}, ${ov.pais}</div></div>
          <div class="detail-item"><div class="detail-label">Courier Sugerido</div><div class="detail-value">${ov.courier_sugerido}</div></div>
        </div>
      </div>
      <div class="detail-section">
        <h4>Artículos</h4>
        <div class="table-wrap" style="margin-top:10px; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden;">
          <table style="width:100%;font-size:.85rem; border-collapse:collapse;">
            <thead>
              <tr style="background:#f1f5f9; border-bottom:1px solid #cbd5e1;">
                <th style="padding:10px;text-align:left">Cód. Pieza</th>
                <th style="padding:10px;text-align:left">Descripción</th>
                <th style="padding:10px;text-align:right">Cantidad</th>
                <th style="padding:10px;text-align:center">UDM</th>
              </tr>
            </thead>
            <tbody>
              ${(ov.items || []).map(it => `
                <tr style="border-bottom:1px solid #e2e8f0; background:#fff;">
                  <td style="padding:10px;">${it.codigo}</td>
                  <td style="padding:10px;font-weight:500">${it.descripcion}</td>
                  <td style="padding:10px;text-align:right">${it.cantidad.toLocaleString()}</td>
                  <td style="padding:10px;text-align:center">${it.udm}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
      const btn = document.getElementById('btnEmitirDesdeDetalle');
      if (canEmit) { btn.style.display = 'flex'; btn.onclick = () => { closeModal('modalDetalle'); abrirEmitir(ov.id); }; }
      else { btn.style.display = 'none'; }
      openModal('modalDetalle');
    }

    function setListeners() {
      document.getElementById('searchInput').addEventListener('input', applyFilters);
      document.getElementById('estadoFilter').addEventListener('change', applyFilters);
      document.getElementById('distFilter').addEventListener('change', applyFilters);
      document.getElementById('selectAll').addEventListener('change', e => {
        document.querySelectorAll('.row-cb').forEach(cb => cb.checked = e.target.checked);
      });
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;background:${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#1754cf'};color:white;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:opacity .4s`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
    }

    function exportarCSV() {
      const headers = ['N° OV', 'Fecha', 'Cliente', 'Destino', 'Cantidad', 'UDM', 'Estado'];
      const rows = filteredOVs.map(o => [o.numero_ov, o.fecha_creacion, o.cliente_nombre, o.distrito, o.cantidad, o.udm, o.estado]);
      const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'ordenes_venta.csv';
      a.click();
    }

    // Cerrar modal al hacer clic fuera
    document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }));

    window._onNotasClose = function () { render(); };
    init();
  </script>
</body>

</html>
