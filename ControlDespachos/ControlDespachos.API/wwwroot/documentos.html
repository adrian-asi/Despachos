<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Documentos - Control de Despachos</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div id="nav-placeholder"></div>
    <div class="page-content">
        <div class="page-header">
            <div class="page-header-left">
                <h1>Gestión de Documentos</h1>
                <p>Adjuntar y consultar documentos por guía de remisión</p>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            <div class="card">
                <div class="card-header"><span class="card-title"><span class="material-icons"
                            style="color:var(--primary)">list_alt</span> Documentos Adjuntos</span></div>
                <div id="docsList" style="padding:16px;display:flex;flex-direction:column;gap:8px"></div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title"><span class="material-icons"
                            style="color:var(--primary)">cloud_upload</span> Subir Nuevo Documento</span></div>
                <div style="padding:24px">
                    <div class="form-group" style="margin-bottom:16px">
                        <label class="form-label">Seleccionar Guía</label>
                        <select class="form-select" id="greSelectDoc"></select>
                    </div>
                    <div class="upload-area" onclick="document.getElementById('fileInputDoc').click()" id="dropArea">
                        <span class="material-icons"
                            style="font-size:48px;color:var(--primary);opacity:.4">cloud_upload</span>
                        <p style="font-weight:600;margin-top:12px">Haz clic o arrastra archivos aquí</p>
                        <p class="text-sm" style="margin-top:6px">PDF, Word, Excel o Imágenes (Máx. 5MB)</p>
                    </div>
                    <input type="file" id="fileInputDoc" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.png"
                        style="display:none" onchange="subirArchivos(this.files)">
                    <div id="newFilesList" style="margin-top:16px;display:flex;flex-direction:column;gap:8px"></div>
                    <button class="btn btn-primary" style="margin-top:16px;width:100%" onclick="guardarDocumentos()">
                        <span class="material-icons">save</span> Guardar Documentos
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script>
        requireAuth();
        document.getElementById('nav-placeholder').innerHTML = renderNav('documentos');
        let gres = [];
        const DOCS_DEMO = [
            { nombre: 'Guia_Despacho_5501.pdf', size: '1.2 MB', tipo: 'PDF', icon: 'picture_as_pdf', color: 'var(--red)' },
            { nombre: 'Evidencia_Entrega.jpg', size: '3.4 MB', tipo: 'JPG', icon: 'image', color: 'var(--green)' },
            { nombre: 'Checklist_Verificacion.xlsx', size: '840 KB', tipo: 'XLSX', icon: 'table_chart', color: 'var(--green)' },
        ];

        function init() {
            gres = genGREs(genOVs());
            const sel = document.getElementById('greSelectDoc');
            gres.slice(0, 20).forEach(g => {
                const op = document.createElement('option'); op.value = g.id; op.textContent = `${g.numero_gre} – ${g.cliente_nombre}`; sel.appendChild(op);
            });
            renderDocs();
            // Drag & drop
            const da = document.getElementById('dropArea');
            da.addEventListener('dragover', e => { e.preventDefault(); da.style.borderColor = 'var(--primary)'; });
            da.addEventListener('dragleave', () => { da.style.borderColor = ''; });
            da.addEventListener('drop', e => { e.preventDefault(); da.style.borderColor = ''; subirArchivos(e.dataTransfer.files); });
        }

        function renderDocs() {
            document.getElementById('docsList').innerHTML = DOCS_DEMO.map(d => `
    <div class="file-item">
      <span class="material-icons file-icon" style="color:${d.color}">${d.icon}</span>
      <div>
        <div class="file-name">${d.nombre}</div>
        <div class="text-sm">${d.size} · ${d.tipo}</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn-icon" title="Descargar"><span class="material-icons" style="font-size:16px">download</span></button>
        <button class="btn-icon" title="Eliminar" onclick="this.closest('.file-item').remove()"><span class="material-icons" style="font-size:16px;color:var(--red)">delete</span></button>
      </div>
    </div>`).join('');
        }

        function subirArchivos(files) {
            const list = document.getElementById('newFilesList');
            [...files].forEach(f => {
                if (f.size > 5 * 1024 * 1024) { showToast(`${f.name}: supera 5MB`, 'error'); return; }
                const el = document.createElement('div'); el.className = 'file-item';
                el.innerHTML = `<span class="material-icons file-icon">description</span>
      <div><div class="file-name">${f.name}</div><div class="text-sm">${(f.size / 1024 / 1024).toFixed(1)} MB</div></div>
      <button class="btn-icon" style="margin-left:auto" onclick="this.parentElement.remove()"><span class="material-icons" style="font-size:16px;color:var(--red)">close</span></button>`;
                list.appendChild(el);
            });
        }

        function guardarDocumentos() {
            showToast('✅ Documentos guardados correctamente', 'success');
            document.getElementById('newFilesList').innerHTML = '';
        }

        function showToast(msg, type = 'info') {
            const t = document.createElement('div'); t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;background:${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#1754cf'};color:white;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:600`;
            t.textContent = msg; document.body.appendChild(t); setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        }
        init();
    </script>
</body>

</html>
